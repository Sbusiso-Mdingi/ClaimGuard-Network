coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 0%
        if_ci_failed: error

flags:
  python:
    paths:
      - packages/claimguard-sdk/
      - services/detection-engine/
      - services/report-producer/
    carryforward: false
  javascript:
    paths:
      - apps/
      - packages/
    carryforward: false

comment:
  layout: "header,diff,flags,tree,footer"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true
  after_n_builds: 2
