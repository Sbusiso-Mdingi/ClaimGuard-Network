name: report-producer-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/producer-deploy.yml"
      - "services/detection-engine/**"
      - "services/report-producer/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: claimguard-report-producer
  cancel-in-progress: false

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINERAPPS_ENVIRONMENT: ${{ vars.AZURE_CONTAINERAPPS_ENVIRONMENT }}
  AZURE_CONTAINERAPPS_JOB: ${{ vars.AZURE_CONTAINERAPPS_JOB }}
  AZURE_REPORT_WORKER_IDENTITY: ${{ vars.AZURE_REPORT_WORKER_IDENTITY }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
  AZURE_KEYVAULT_URI: ${{ vars.AZURE_KEYVAULT_URI }}
  CONTROL_PLANE_MYSQL_SECRET_NAME: ${{ vars.CONTROL_PLANE_MYSQL_SECRET_NAME }}
  OPERATIONAL_MYSQL_SECRET_NAME: ${{ vars.OPERATIONAL_MYSQL_SECRET_NAME }}
  REPORT_STORAGE_ACCOUNT_URL: ${{ vars.REPORT_STORAGE_ACCOUNT_URL }}
  REPORT_STORAGE_CONTAINER: ${{ vars.REPORT_STORAGE_CONTAINER }}
  DATA_PLANE_ENVIRONMENT: legacy
  DATA_PLANE_PRIVATE_ENVIRONMENT: production
  DATA_PLANE_SUPPORTED_SCHEMA_VERSIONS: "10"

jobs:
  build-deploy-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Validate worker scope and resolve managed identity
        shell: bash
        run: |
          set -euo pipefail
          WORKER_IDENTITY_ID="$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_REPORT_WORKER_IDENTITY" \
            --query id \
            --output tsv)"
          WORKER_IDENTITY_CLIENT_ID="$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_REPORT_WORKER_IDENTITY" \
            --query clientId \
            --output tsv)"

          test -n "$WORKER_IDENTITY_ID" || { echo "Report-worker managed identity is missing"; exit 1; }
          test -n "$WORKER_IDENTITY_CLIENT_ID" || { echo "Report-worker managed identity client ID is missing"; exit 1; }
          echo "WORKER_IDENTITY_ID=$WORKER_IDENTITY_ID" >> "$GITHUB_ENV"
          echo "WORKER_IDENTITY_CLIENT_ID=$WORKER_IDENTITY_CLIENT_ID" >> "$GITHUB_ENV"

      - name: Build and push immutable worker image
        run: |
          az acr build \
            --registry "$AZURE_ACR_NAME" \
            --image "report-producer:${GITHUB_SHA}" \
            --file services/report-producer/Dockerfile \
            .

      - name: Create scheduled worker when absent
        id: create
        shell: bash
        run: |
          set -euo pipefail
          if az containerapp job show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          az containerapp job create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --environment "$AZURE_CONTAINERAPPS_ENVIRONMENT" \
            --trigger-type Schedule \
            --cron-expression "*/5 * * * *" \
            --replica-timeout 1800 \
            --replica-retry-limit 0 \
            --parallelism 1 \
            --replica-completion-count 1 \
            --image "$AZURE_ACR_LOGIN_SERVER/report-producer:${GITHUB_SHA}" \
            --container-name report-producer \
            --cpu 1.0 \
            --memory 2Gi \
            --command claimguard-produce-report \
            --args worker drain-all \
            --mi-user-assigned "$WORKER_IDENTITY_ID" \
            --registry-server "$AZURE_ACR_LOGIN_SERVER" \
            --registry-identity "$WORKER_IDENTITY_ID" \
            --secrets \
              "control-plane-url=keyvaultref:${AZURE_KEYVAULT_URI}/secrets/${CONTROL_PLANE_MYSQL_SECRET_NAME},identityref:${WORKER_IDENTITY_ID}" \
              "operational-url=keyvaultref:${AZURE_KEYVAULT_URI}/secrets/${OPERATIONAL_MYSQL_SECRET_NAME},identityref:${WORKER_IDENTITY_ID}" \
            --env-vars \
              CONTROL_PLANE_MYSQL_URL=secretref:control-plane-url \
              MYSQL_URL=secretref:operational-url \
              AZURE_CLIENT_ID="$WORKER_IDENTITY_CLIENT_ID" \
              ML_INFERENCE_URL="https://claimguard-ml-inference.livelydune-39b25d2c.southafricanorth.azurecontainerapps.io" \
              REPORT_STORAGE_BACKEND=azure_blob \
              REPORT_STORAGE_ACCOUNT_URL="$REPORT_STORAGE_ACCOUNT_URL" \
              REPORT_STORAGE_CONTAINER="$REPORT_STORAGE_CONTAINER" \
              DATA_PLANE_ENVIRONMENT="$DATA_PLANE_ENVIRONMENT" \
              DATA_PLANE_PRIVATE_ENVIRONMENT="$DATA_PLANE_PRIVATE_ENVIRONMENT" \
              DATA_PLANE_SUPPORTED_SCHEMA_VERSIONS="$DATA_PLANE_SUPPORTED_SCHEMA_VERSIONS" \
              REPORT_WORKER_BATCH_SIZE=10 \
              REPORT_WORKER_MAX_BATCHES_PER_RUN=100 \
              REPORT_WORKER_LEASE_SECONDS=300 \
              REPORT_WORKER_MAX_ATTEMPTS=5 \
              REPORT_WORKER_RETRY_INITIAL_SECONDS=30 \
              REPORT_WORKER_RETRY_MAX_SECONDS=900
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Update existing scheduled worker
        if: steps.create.outputs.created == 'false'
        shell: bash
        run: |
          set -euo pipefail
          TRIGGER_TYPE="$(az containerapp job show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --query properties.configuration.triggerType \
            --output tsv)"
          test "$TRIGGER_TYPE" = "Schedule" || { echo "Existing report-worker job must use the Schedule trigger"; exit 1; }

          az containerapp job identity assign \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --user-assigned "$WORKER_IDENTITY_ID"

          az containerapp job registry set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --server "$AZURE_ACR_LOGIN_SERVER" \
            --identity "$WORKER_IDENTITY_ID"

          az containerapp job secret set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --secrets \
              "control-plane-url=keyvaultref:${AZURE_KEYVAULT_URI}/secrets/${CONTROL_PLANE_MYSQL_SECRET_NAME},identityref:${WORKER_IDENTITY_ID}" \
              "operational-url=keyvaultref:${AZURE_KEYVAULT_URI}/secrets/${OPERATIONAL_MYSQL_SECRET_NAME},identityref:${WORKER_IDENTITY_ID}"

          az containerapp job update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --image "$AZURE_ACR_LOGIN_SERVER/report-producer:${GITHUB_SHA}" \
            --cron-expression "*/5 * * * *" \
            --replica-timeout 1800 \
            --replica-retry-limit 0 \
            --parallelism 1 \
            --replica-completion-count 1 \
            --container-name report-producer \
            --cpu 1.0 \
            --memory 2Gi \
            --command claimguard-produce-report \
            --args worker drain-all \
            --replace-env-vars \
              CONTROL_PLANE_MYSQL_URL=secretref:control-plane-url \
              MYSQL_URL=secretref:operational-url \
              AZURE_CLIENT_ID="$WORKER_IDENTITY_CLIENT_ID" \
              ML_INFERENCE_URL="https://claimguard-ml-inference.livelydune-39b25d2c.southafricanorth.azurecontainerapps.io" \
              REPORT_STORAGE_BACKEND=azure_blob \
              REPORT_STORAGE_ACCOUNT_URL="$REPORT_STORAGE_ACCOUNT_URL" \
              REPORT_STORAGE_CONTAINER="$REPORT_STORAGE_CONTAINER" \
              DATA_PLANE_ENVIRONMENT="$DATA_PLANE_ENVIRONMENT" \
              DATA_PLANE_PRIVATE_ENVIRONMENT="$DATA_PLANE_PRIVATE_ENVIRONMENT" \
              DATA_PLANE_SUPPORTED_SCHEMA_VERSIONS="$DATA_PLANE_SUPPORTED_SCHEMA_VERSIONS" \
              REPORT_WORKER_BATCH_SIZE=10 \
              REPORT_WORKER_MAX_BATCHES_PER_RUN=100 \
              REPORT_WORKER_LEASE_SECONDS=300 \
              REPORT_WORKER_MAX_ATTEMPTS=5 \
              REPORT_WORKER_RETRY_INITIAL_SECONDS=30 \
              REPORT_WORKER_RETRY_MAX_SECONDS=900

      - name: Start and verify a worker execution
        shell: bash
        run: |
          set -euo pipefail
          EXECUTION_NAME="$(az containerapp job start \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --query name \
            --output tsv)"
          test -n "$EXECUTION_NAME" || { echo "Worker execution did not start"; exit 1; }

          for attempt in $(seq 1 60); do
            STATUS="$(az containerapp job execution show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_CONTAINERAPPS_JOB" \
              --job-execution-name "$EXECUTION_NAME" \
              --query properties.status \
              --output tsv)"
            echo "Worker execution $EXECUTION_NAME status=$STATUS attempt=$attempt"
            if [ "$STATUS" = "Succeeded" ]; then
              exit 0
            fi
            if [ "$STATUS" = "Failed" ]; then
              az containerapp job logs show \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$AZURE_CONTAINERAPPS_JOB" \
                --execution "$EXECUTION_NAME" \
                --container report-producer \
                --tail 200 \
                --format text || true
              exit 1
            fi
            sleep 10
          done

          echo "Worker execution did not complete within ten minutes"
          az containerapp job logs show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINERAPPS_JOB" \
            --execution "$EXECUTION_NAME" \
            --container report-producer \
            --tail 200 \
            --format text || true
          exit 1
