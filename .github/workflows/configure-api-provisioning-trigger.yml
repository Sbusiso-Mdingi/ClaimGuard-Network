name: Verify API provisioning trigger

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: verify-api-provisioning-trigger
  cancel-in-progress: false

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_WEBAPP_API: ${{ vars.AZURE_WEBAPP_API }}
  AZURE_PROVISIONING_JOB_NAME: ${{ vars.AZURE_PROVISIONING_JOB_NAME || 'claimguard-provisioning-worker' }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail

          required=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_RESOURCE_GROUP
            AZURE_WEBAPP_API
            AZURE_PROVISIONING_JOB_NAME
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Error: ${name} is not configured."
              exit 1
            fi
          done

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Resolve Azure resources
        shell: bash
        run: |
          set -euo pipefail

          API_PRINCIPAL_ID="$(
            az webapp identity show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query principalId \
              --output tsv
          )"

          if [ -z "$API_PRINCIPAL_ID" ]; then
            echo "Error: claimguard-api does not have a system-assigned managed identity."
            exit 1
          fi

          JOB_RESOURCE_ID="$(
            az containerapp job show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_PROVISIONING_JOB_NAME" \
              --query id \
              --output tsv
          )"

          if [ -z "$JOB_RESOURCE_ID" ]; then
            echo "Error: Azure did not return the provisioning-job resource ID."
            exit 1
          fi

          echo "API_PRINCIPAL_ID=$API_PRINCIPAL_ID" >> "$GITHUB_ENV"
          echo "JOB_RESOURCE_ID=$JOB_RESOURCE_ID" >> "$GITHUB_ENV"

      - name: Verify job-scoped start permission
        shell: bash
        run: |
          set -euo pipefail

          ASSIGNMENT_COUNT="$(
            az role assignment list \
              --assignee-object-id "$API_PRINCIPAL_ID" \
              --scope "$JOB_RESOURCE_ID" \
              --query "[?roleDefinitionName=='Container Apps Jobs Operator'] | length(@)" \
              --output tsv
          )"

          if [ "$ASSIGNMENT_COUNT" != "1" ]; then
            echo "Error: claimguard-api does not have Container Apps Jobs Operator on the provisioning job."
            exit 1
          fi

          echo "Verified API job-scoped Container Apps Jobs Operator assignment."

      - name: Verify API trigger settings
        shell: bash
        run: |
          set -euo pipefail

          ENABLED="$(
            az webapp config appsettings list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query "[?name=='AZURE_PROVISIONING_JOB_TRIGGER_ENABLED'].value | [0]" \
              --output tsv
          )"

          CONFIGURED_SUBSCRIPTION="$(
            az webapp config appsettings list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query "[?name=='AZURE_PROVISIONING_JOB_SUBSCRIPTION_ID'].value | [0]" \
              --output tsv
          )"

          CONFIGURED_RESOURCE_GROUP="$(
            az webapp config appsettings list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query "[?name=='AZURE_PROVISIONING_JOB_RESOURCE_GROUP'].value | [0]" \
              --output tsv
          )"

          CONFIGURED_JOB="$(
            az webapp config appsettings list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query "[?name=='AZURE_PROVISIONING_JOB_NAME'].value | [0]" \
              --output tsv
          )"

          API_VERSION="$(
            az webapp config appsettings list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query "[?name=='AZURE_PROVISIONING_JOB_API_VERSION'].value | [0]" \
              --output tsv
          )"

          SCHEMA_VERSION="$(
            az webapp config appsettings list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_API" \
              --query "[?name=='PRIVATE_TENANT_SCHEMA_VERSION'].value | [0]" \
              --output tsv
          )"

          test "$ENABLED" = "true"
          test "$CONFIGURED_SUBSCRIPTION" = "$AZURE_SUBSCRIPTION_ID"
          test "$CONFIGURED_RESOURCE_GROUP" = "$AZURE_RESOURCE_GROUP"
          test "$CONFIGURED_JOB" = "$AZURE_PROVISIONING_JOB_NAME"
          test "$API_VERSION" = "2025-07-01"
          test "$SCHEMA_VERSION" = "14"

          echo "Verified automatic API provisioning-trigger settings."

      - name: Verify provisioning-worker configuration
        shell: bash
        run: |
          set -euo pipefail

          WORKER_IMAGE="$(
            az containerapp job show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_PROVISIONING_JOB_NAME" \
              --query "properties.template.containers[0].image" \
              --output tsv
          )"

          WORKER_SCHEMA_VERSION="$(
            az containerapp job show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_PROVISIONING_JOB_NAME" \
              --query "properties.template.containers[0].env[?name=='PRIVATE_TENANT_SCHEMA_VERSION'].value | [0]" \
              --output tsv
          )"

          if [ -z "$WORKER_IMAGE" ]; then
            echo "Error: provisioning-worker image is not configured."
            exit 1
          fi

          if [ "$WORKER_SCHEMA_VERSION" != "14" ]; then
            echo "Error: provisioning-worker schema version is '$WORKER_SCHEMA_VERSION', expected '14'."
            exit 1
          fi

          echo "Provisioning worker image: $WORKER_IMAGE"
          echo "Provisioning worker schema: $WORKER_SCHEMA_VERSION"

      - name: Verification summary
        shell: bash
        run: |
          set -euo pipefail

          echo "API managed identity: $API_PRINCIPAL_ID"
          echo "Provisioning-job scope: $JOB_RESOURCE_ID"
          echo "Automatic API-triggered provisioning is correctly configured."
