name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: dc32e620-8239-4f20-b5ae-ca3c91cf9146
  AZURE_TENANT_ID: 8efc1bb9-b90f-4a48-bf6c-ba0686193b80
  AZURE_SUBSCRIPTION_ID: 896d3c72-d979-4bdc-a37f-060988d12032
  AZURE_RESOURCE_GROUP: ClaimGuard
  AZURE_WEBAPP_WEB: claimguard-web
  AZURE_WEBAPP_API: claimguard-api

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm CLI
        uses: pnpm/action-setup@v6

      - name: Setup Node.js + pnpm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        id: pnpm-store-cache
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install JS dependencies (root workspace)
        run: pnpm install --frozen-lockfile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install Python deps for data-generator
        run: |
          cd packages/data-generator
          uv sync --all-groups

      - name: Run monorepo tasks (lint/test/build affected)
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          pnpm turbo run lint test build --filter=...[origin/${BASE_REF}]

      - name: Build and test web app
        working-directory: ./
        run: |
          pnpm --filter ./apps/web run build
          pnpm --filter ./apps/web run test --silent -- --run

      - name: Build and test api package (if present)
        run: |
          if [ -f "apps/api/package.json" ]; then
            pnpm --filter ./apps/api run build
            pnpm --filter ./apps/api run test || exit 1
          else
            echo "apps/api not present; skipping"
          fi

      - name: Upload web build artifact for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 14

      - name: Run Python tests with coverage (data-generator)
        run: |
          cd packages/data-generator
          pnpm test

      - name: Upload Python coverage to Codecov
        if: success() && env.CODECOV_TOKEN && hashFiles('packages/data-generator/coverage.xml') != ''
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/data-generator/coverage.xml
          flags: python
          fail_ci_if_error: true
          verbose: true

      - name: Package deployable web artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/claimguard-web-deploy
          pnpm --filter ./apps/web deploy /tmp/claimguard-web-deploy -P
          rm -f /tmp/claimguard-web-deploy.zip
          cd /tmp/claimguard-web-deploy
          zip -qr /tmp/claimguard-web-deploy.zip . \
            -x ".turbo/*" \
               "tests/*" \
               "docs/*" \
               "src/setupTests.js" \
               "vitest.config.ts"

      - name: Package deployable api artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/claimguard-api-deploy
          pnpm --filter ./apps/api deploy /tmp/claimguard-api-deploy -P
          rm -f /tmp/claimguard-api-deploy.zip
          cd /tmp/claimguard-api-deploy
          # Preserve pnpm symlinks in the zip to keep runtime module resolution intact.
          zip -qry /tmp/claimguard-api-deploy.zip . \
            -x ".turbo/*" \
               "tests/*" \
               "reports/*" \
               "*.log"

      - name: Verify API artifact preserves pnpm symlinks
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/claimguard-api-deploy-check
          mkdir -p /tmp/claimguard-api-deploy-check
          unzip -q /tmp/claimguard-api-deploy.zip -d /tmp/claimguard-api-deploy-check
          test -L /tmp/claimguard-api-deploy-check/node_modules/hono
          test -L /tmp/claimguard-api-deploy-check/node_modules/@claimguard/database

      - name: Upload deployable artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: claimguard-deploy-packages
          path: |
            /tmp/claimguard-web-deploy.zip
            /tmp/claimguard-api-deploy.zip
          retention-days: 14

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download deployable artifacts
        uses: actions/download-artifact@v4
        with:
          name: claimguard-deploy-packages
          path: /tmp/claimguard-deploy-packages

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Enable run-from-package for web
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_WEB" \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Enable run-from-package for api
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_API" \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Deploy web app with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: >
            az webapp deploy
            --resource-group "$AZURE_RESOURCE_GROUP"
            --name "$AZURE_WEBAPP_WEB"
            --type zip
            --src-path /tmp/claimguard-deploy-packages/claimguard-web-deploy.zip
            --clean false
            --track-status false
            --timeout 1800000

      - name: Deploy api app with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: >
            az webapp deploy
            --resource-group "$AZURE_RESOURCE_GROUP"
            --name "$AZURE_WEBAPP_API"
            --type zip
            --src-path /tmp/claimguard-deploy-packages/claimguard-api-deploy.zip
            --clean false
            --track-status false
            --timeout 1800000

      - name: Verify deployment health endpoints
        run: |
          set -euo pipefail
          API_HEALTH_URL="https://${AZURE_WEBAPP_API}.azurewebsites.net/health"
          API_READY_URL="https://${AZURE_WEBAPP_API}.azurewebsites.net/ready"
          WEB_ROOT_URL="https://${AZURE_WEBAPP_WEB}.azurewebsites.net/"
          WEB_INDEX_URL="https://${AZURE_WEBAPP_WEB}.azurewebsites.net/index.html"

          for attempt in 1 2 3 4 5; do
            API_OK=0
            WEB_OK=0

            curl -fsS "$API_HEALTH_URL" >/dev/null && API_OK=1 || true

            WEB_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$WEB_ROOT_URL" || true)"
            if [ "$WEB_STATUS" = "200" ] || [ "$WEB_STATUS" = "301" ] || [ "$WEB_STATUS" = "302" ]; then
              WEB_OK=1
            else
              INDEX_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$WEB_INDEX_URL" || true)"
              if [ "$INDEX_STATUS" = "200" ]; then
                WEB_OK=1
              fi
            fi

            if [ "$API_OK" = "1" ] && [ "$WEB_OK" = "1" ]; then
              break
            fi

            echo "Deployment verification attempt $attempt failed; retrying in 10 seconds..."
            sleep 10
          done

          curl -fsS "$API_HEALTH_URL" | cat
          curl -fsS "$API_READY_URL" | cat

          FINAL_WEB_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$WEB_ROOT_URL" || true)"
          if [ "$FINAL_WEB_STATUS" = "200" ] || [ "$FINAL_WEB_STATUS" = "301" ] || [ "$FINAL_WEB_STATUS" = "302" ]; then
            exit 0
          fi

          FINAL_INDEX_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$WEB_INDEX_URL" || true)"
          if [ "$FINAL_INDEX_STATUS" = "200" ]; then
            exit 0
          fi

          echo "Web deployment verification failed: root status=$FINAL_WEB_STATUS index status=$FINAL_INDEX_STATUS"
          exit 1
