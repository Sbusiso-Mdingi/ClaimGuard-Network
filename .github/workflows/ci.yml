name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  AZURE_CLIENT_ID: dc32e620-8239-4f20-b5ae-ca3c91cf9146
  AZURE_TENANT_ID: 8efc1bb9-b90f-4a48-bf6c-ba0686193b80
  AZURE_SUBSCRIPTION_ID: 896d3c72-d979-4bdc-a37f-060988d12032
  AZURE_RESOURCE_GROUP: ClaimGuard
  AZURE_KEYVAULT_NAME: claimguard-kv-ufs
  MYSQL_URL_SECRET_NAME: claimguard--api--mysql-url
  AZURE_WEBAPP_WEB: claimguard-web
  AZURE_WEBAPP_API: claimguard-api

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and build the complete monorepo
        run: pnpm turbo run lint build

      - name: Run JavaScript tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf coverage/javascript
          mkdir -p coverage/javascript/raw

          export NODE_V8_COVERAGE="$GITHUB_WORKSPACE/coverage/javascript/raw"
          pnpm --recursive \
            --filter './apps/**' \
            --filter './packages/**' \
            --filter '!@claimguard/claimguard-sdk' \
            --if-present \
            run test
          unset NODE_V8_COVERAGE

          pnpm dlx c8@12.0.0 report \
            --temp-directory=coverage/javascript/raw \
            --all \
            --src=apps \
            --src=packages \
            --extension=.js \
            --extension=.jsx \
            --extension=.cjs \
            --extension=.mjs \
            --exclude='**/tests/**' \
            --exclude='**/*.test.*' \
            --exclude='**/dist/**' \
            --exclude='**/node_modules/**' \
            --exclude='**/src/setupTests.js' \
            --reporter=text-summary \
            --reporter=lcov \
            --reports-dir=coverage/javascript

          test -s coverage/javascript/lcov.info

      - name: Run all Python tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf coverage/python
          mkdir -p coverage/python

          COVERAGE_FILE="$GITHUB_WORKSPACE/coverage/python/.coverage.claimguard-sdk" \
          uv run --project packages/claimguard-sdk --frozen --with coverage==7.15.2 \
            coverage run --rcfile=coverage.ini \
            -m pytest packages/claimguard-sdk/tests

          COVERAGE_FILE="$GITHUB_WORKSPACE/coverage/python/.coverage.detection-engine" \
          uv run --project services/detection-engine --frozen --with coverage==7.15.2 \
            coverage run --rcfile=coverage.ini \
            -m unittest discover \
            -s services/detection-engine/tests \
            -p 'test_*.py'

          COVERAGE_FILE="$GITHUB_WORKSPACE/coverage/python/.coverage.report-producer" \
          uv run --project services/report-producer --frozen --with coverage==7.15.2 \
            coverage run --rcfile=coverage.ini \
            -m unittest discover \
            -s services/report-producer/tests \
            -p 'test_*.py'

          COVERAGE_FILE="$GITHUB_WORKSPACE/coverage/python/.coverage" \
          uv run --project packages/claimguard-sdk --frozen --with coverage==7.15.2 \
            coverage combine --rcfile=coverage.ini coverage/python
          COVERAGE_FILE="$GITHUB_WORKSPACE/coverage/python/.coverage" \
          uv run --project packages/claimguard-sdk --frozen --with coverage==7.15.2 \
            coverage xml --rcfile=coverage.ini \
            -o coverage/python/coverage.xml

          test -s coverage/python/coverage.xml

      - name: Upload JavaScript coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: ./coverage/javascript/lcov.info
          flags: javascript
          name: javascript
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: ./coverage/python/coverage.xml
          flags: python
          name: python
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Upload web build artifact for inspection
        if: ${{ always() && hashFiles('apps/web/dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 14

      - name: Package deployable web artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/claimguard-web-deploy
          pnpm --filter ./apps/web deploy /tmp/claimguard-web-deploy -P
          rm -f /tmp/claimguard-web-deploy.zip
          cd /tmp/claimguard-web-deploy
          zip -qr /tmp/claimguard-web-deploy.zip . \
            -x ".turbo/*" \
               "tests/*" \
               "docs/*" \
               "src/setupTests.js" \
               "vitest.config.ts"

      - name: Package deployable API artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/claimguard-api-deploy
          pnpm --filter ./apps/api deploy /tmp/claimguard-api-deploy -P
          rm -f /tmp/claimguard-api-deploy.zip
          cd /tmp/claimguard-api-deploy
          # Preserve pnpm symlinks in the zip to keep runtime module resolution intact.
          zip -qry /tmp/claimguard-api-deploy.zip . \
            -x ".turbo/*" \
               "tests/*" \
               "reports/*" \
               "*.log"

      - name: Verify API artifact preserves pnpm symlinks
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/claimguard-api-deploy-check
          mkdir -p /tmp/claimguard-api-deploy-check
          unzip -q /tmp/claimguard-api-deploy.zip -d /tmp/claimguard-api-deploy-check
          test -L /tmp/claimguard-api-deploy-check/node_modules/hono
          test -L /tmp/claimguard-api-deploy-check/node_modules/@claimguard/database

      - name: Upload deployable artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: claimguard-deploy-packages
          path: |
            /tmp/claimguard-web-deploy.zip
            /tmp/claimguard-api-deploy.zip
          if-no-files-found: error
          retention-days: 14

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: claimguard-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download deployable artifacts
        uses: actions/download-artifact@v4
        with:
          name: claimguard-deploy-packages
          path: /tmp/claimguard-deploy-packages

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install migration dependencies from the lockfile
        run: pnpm install --frozen-lockfile

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Run database migrations
        env:
          OPERATIONAL_ADMIN_MODE: legacy_shared
        run: |
          set -euo pipefail
          # Runtime database access is governed through Key Vault, not App Service values.
          export MYSQL_URL="$(az keyvault secret show \
            --vault-name "$AZURE_KEYVAULT_NAME" \
            --name "$MYSQL_URL_SECRET_NAME" \
            --query value \
            --output tsv)"

          if [ -z "$MYSQL_URL" ]; then
            echo "Error: MYSQL_URL not found in Key Vault"
            exit 1
          fi

          pnpm --filter @claimguard/database exec node src/migrate.js

      - name: Enable run-from-package for web
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_WEB" \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Enable run-from-package for API
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_API" \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Deploy web app with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: >
            az webapp deploy
            --resource-group "$AZURE_RESOURCE_GROUP"
            --name "$AZURE_WEBAPP_WEB"
            --type zip
            --src-path /tmp/claimguard-deploy-packages/claimguard-web-deploy.zip
            --clean false
            --track-status true
            --timeout 1800000

      - name: Deploy API app with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: >
            az webapp deploy
            --resource-group "$AZURE_RESOURCE_GROUP"
            --name "$AZURE_WEBAPP_API"
            --type zip
            --src-path /tmp/claimguard-deploy-packages/claimguard-api-deploy.zip
            --clean false
            --track-status true
            --timeout 1800000

      - name: Verify deployment health endpoints
        run: |
          set -euo pipefail
          API_HEALTH_URL="https://${AZURE_WEBAPP_API}.azurewebsites.net/health"
          API_READY_URL="https://${AZURE_WEBAPP_API}.azurewebsites.net/ready"
          WEB_ROOT_URL="https://${AZURE_WEBAPP_WEB}.azurewebsites.net/"
          WEB_INDEX_URL="https://${AZURE_WEBAPP_WEB}.azurewebsites.net/index.html"

          # Allow up to 5 minutes for App Service warm-up after deployment.
          for attempt in $(seq 1 30); do
            API_HEALTH_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$API_HEALTH_URL" || true)"
            API_READY_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$API_READY_URL" || true)"
            WEB_ROOT_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$WEB_ROOT_URL" || true)"
            WEB_INDEX_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$WEB_INDEX_URL" || true)"

            API_OK=0
            WEB_OK=0

            if [ "$API_HEALTH_STATUS" = "200" ] && [ "$API_READY_STATUS" = "200" ]; then
              API_OK=1
            fi

            if [ "$WEB_ROOT_STATUS" = "200" ] || [ "$WEB_ROOT_STATUS" = "301" ] || [ "$WEB_ROOT_STATUS" = "302" ] || [ "$WEB_INDEX_STATUS" = "200" ]; then
              WEB_OK=1
            fi

            if [ "$API_OK" = "1" ] && [ "$WEB_OK" = "1" ]; then
              echo "Deployment verification passed on attempt $attempt"
              exit 0
            fi

            echo "Attempt $attempt: api_health=$API_HEALTH_STATUS api_ready=$API_READY_STATUS web_root=$WEB_ROOT_STATUS web_index=$WEB_INDEX_STATUS"
            sleep 10
          done

          echo "Deployment verification failed after retries."
          exit 1

      - name: Capture bounded App Service diagnostics on deploy failure
        if: failure()
        run: |
          set +e
          mkdir -p /tmp/claimguard-failure-diagnostics

          echo "## App Service runtime summary"
          az webapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_API" \
            --query '{state:state,host:defaultHostName,linuxFxVersion:siteConfig.linuxFxVersion}' \
            --output json

          echo "## Startup command"
          az webapp config show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_API" \
            --query 'appCommandLine' \
            --output tsv

          echo "## Runtime-related app settings (presence only)"
          az webapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_API" \
            --query "[?name=='WEBSITE_NODE_DEFAULT_VERSION' || name=='WEBSITE_RUN_FROM_PACKAGE' || name=='SCM_DO_BUILD_DURING_DEPLOYMENT' || name=='WEBSITES_PORT'].{name:name,configured:join('', ['set'])}" \
            --output table

          echo "## Safe health probes"
          API_HEALTH_URL="https://${AZURE_WEBAPP_API}.azurewebsites.net/health"
          API_READY_URL="https://${AZURE_WEBAPP_API}.azurewebsites.net/ready"
          HEALTH_STATUS="$(curl -sS -m 15 -o /tmp/claimguard-failure-diagnostics/health-body.txt -w '%{http_code}' "$API_HEALTH_URL" || true)"
          READY_STATUS="$(curl -sS -m 15 -o /tmp/claimguard-failure-diagnostics/ready-body.txt -w '%{http_code}' "$API_READY_URL" || true)"
          echo "health_status=${HEALTH_STATUS}"
          echo "ready_status=${READY_STATUS}"
          sed -n '1,120p' /tmp/claimguard-failure-diagnostics/health-body.txt
          sed -n '1,200p' /tmp/claimguard-failure-diagnostics/ready-body.txt

          echo "## Download bounded app logs"
          az webapp log download \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_API" \
            --log-file /tmp/claimguard-failure-diagnostics/api-logs.zip >/dev/null

          mkdir -p /tmp/claimguard-failure-diagnostics/logs
          unzip -q -o /tmp/claimguard-failure-diagnostics/api-logs.zip -d /tmp/claimguard-failure-diagnostics/logs

          echo "## Recent startup and container exceptions (redacted)"
          grep -RInE "Error:|Exception|MODULE_NOT_FOUND|Cannot find module|Unhandled|exited with code|Killed|failed to start|ContainerTimeout|SiteStartupCancelled|node src/backend-server.js" /tmp/claimguard-failure-diagnostics/logs/LogFiles | tail -n 200 \
            | sed -E 's#(https?://)[^ @]+@#\\1REDACTED@#g; s#(password|pwd|token|secret|connectionstring|cookie|authorization)[^[:space:]]*#\\1=REDACTED#Ig; s#(AccountKey=)[^;]+#\\1REDACTED#Ig; s#(SharedAccessKey=)[^;]+#\\1REDACTED#Ig'
