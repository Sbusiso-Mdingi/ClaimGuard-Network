name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: astral-sh/setup-uv@v4

      - name: Install JS deps
        run: pnpm install --frozen-lockfile=false

      - name: Install Python deps for data-generator
        run: |
          cd packages/data-generator
          uv sync --all-groups

      - name: Lint, test, build affected packages
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          pnpm turbo run lint test build --filter=...[origin/${BASE_REF}]

      - name: Upload Python coverage to Codecov
        if: ${{ hashFiles('packages/data-generator/coverage.xml') != '' }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/data-generator/coverage.xml
          flags: python
          fail_ci_if_error: true
          verbose: true
