          - name: PROVISIONING_KEYVAULT_URI
            value: https://claimguard-kv-ufs.vault.azure.net/
          - name: AZURE_APPROVED_SUBSCRIPTION_ID
            value: 896d3c72-d979-4bdc-a37f-060988d12032
