        identity: /subscriptions/896d3c72-d979-4bdc-a37f-060988d12032/resourceGroups/ClaimGuard/providers/Microsoft.ManagedIdentity/userAssignedIdentities/claimguard-provisioner-identity
    registries:
      - server: claimguardacr11e.azurecr.io
        identity: /subscriptions/896d3c72-d979-4bdc-a37f-060988d12032/resourceGroups/ClaimGuard/providers/Microsoft.ManagedIdentity/userAssignedIdentities/claimguard-provisioner-identity
  template:
    containers:
      - name: provisioning-worker
        image: claimguardacr11e.azurecr.io/claimguard/provisioning-worker:phase11e-pending
