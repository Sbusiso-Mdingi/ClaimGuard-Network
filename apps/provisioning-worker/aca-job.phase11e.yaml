            value: ClaimGuard
          - name: AZURE_APPROVED_MYSQL_SERVER
            value: claimguard
          - name: AZURE_APPROVED_KEYVAULT
            value: claimguard-kv-ufs
          - name: AZURE_APPROVED_STORAGE_ACCOUNT
            value: cgrpt0715sa
          - name: AZURE_APPROVED_REGION
            value: southafricanorth
          - name: AZURE_APPROVED_ENVIRONMENT_KEY
            value: production
          - name: AZURE_APPROVED_REPORT_CONTAINER
            value: claimguard-reports
