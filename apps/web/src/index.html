<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClaimGuard Network</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081018;
        --bg-soft: #0e1a26;
        --card: rgba(9, 18, 28, 0.9);
        --card-strong: rgba(12, 23, 36, 0.96);
        --text: #edf4ff;
        --muted: #a5b4cb;
        --accent: #87e0bd;
        --accent-2: #f5c16a;
        --accent-3: #8bb8ff;
        --border: rgba(167, 186, 214, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI Variable Text", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(135, 224, 189, 0.16), transparent 26%),
          radial-gradient(circle at top right, rgba(139, 184, 255, 0.14), transparent 22%),
          radial-gradient(circle at 50% 0%, rgba(245, 193, 106, 0.08), transparent 28%),
          linear-gradient(160deg, var(--bg), #04070d 72%);
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(circle at top, black, transparent 82%);
        opacity: 0.35;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0 72px;
      }

      .hero {
        display: grid;
        gap: 18px;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(16, 30, 48, 0.98), rgba(8, 15, 24, 0.9));
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.78rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 6vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
      }

      h2,
      h3 {
        font-family: "Avenir Next", "Segoe UI Variable Display", sans-serif;
        letter-spacing: -0.03em;
      }

      .lede {
        max-width: 72ch;
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 0.92rem;
      }

      .pill[data-tone="good"] { color: var(--accent); }
      .pill[data-tone="warning"] { color: var(--accent-2); }

      .pill[data-tone="info"] { color: var(--accent-3); }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        margin-top: 22px;
      }

      .panel {
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.16);
      }

      .panel:hover {
        border-color: rgba(135, 224, 189, 0.32);
        background: var(--card-strong);
      }

      .panel h2,
      .panel h3 {
        margin: 0 0 12px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }

      .section-header h2,
      .section-header h3 {
        margin: 0;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .metric dt {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .metric dd {
        margin: 4px 0 0;
        font-size: 1.25rem;
        font-weight: 700;
      }

      .network-panel {
        grid-column: 1 / -1;
      }

      .scheme {
        display: grid;
        gap: 14px;
      }

      .finding-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }

      .finding {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .finding strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
      }

      .finding p {
        margin: 6px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .empty,
      .error {
        padding: 16px;
        border-radius: 16px;
        border: 1px dashed var(--border);
        color: var(--muted);
      }

      .error {
        border-color: rgba(246, 196, 109, 0.45);
        color: var(--accent-2);
      }

      .finding.link-finding {
        background: linear-gradient(180deg, rgba(139, 184, 255, 0.08), rgba(255, 255, 255, 0.03));
      }

      button {
        appearance: none;
        border: 1px solid rgba(135, 224, 189, 0.3);
        background: linear-gradient(180deg, rgba(135, 224, 189, 0.18), rgba(135, 224, 189, 0.08));
        color: var(--text);
        padding: 12px 16px;
        border-radius: 999px;
        font: inherit;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: rgba(135, 224, 189, 0.5);
      }

      button:focus-visible {
        outline: 2px solid var(--accent-3);
        outline-offset: 2px;
      }

      .fade-in {
        animation: fade-in 380ms ease-out both;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1120px);
          padding-top: 20px;
        }

        .hero,
        .panel {
          border-radius: 18px;
        }

        .metrics {
          grid-template-columns: 1fr;
        }

        .section-header {
          align-items: flex-start;
          flex-direction: column;
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <script>
      window.__CLAIMGUARD_WEB_DSN__ = "__SENTRY_DSN_WEB__";
      window.__CLAIMGUARD_WEB_ENV__ = "__NODE_ENV__";
    </script>
    <main id="app"></main>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
