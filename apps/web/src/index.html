<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClaimGuard Network</title>
    <script>
      try {
        const preferredTheme = window.localStorage.getItem("claimguard-theme") || "dark";
        if (preferredTheme === "dark") document.documentElement.classList.add("dark");
      } catch {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <script>
      window.__CLAIMGUARD_WEB_DSN__ = "__SENTRY_DSN_WEB__";
      window.__CLAIMGUARD_WEB_ENV__ = "__NODE_ENV__";
    </script>
    <main id="app"></main>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
