[project]
name = "claimguard-data-generator"
version = "0.1.0"
description = "ClaimGuard Phase 1 synthetic multi-scheme claims data generator"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.24",
  "pandas>=2.0",
  "Faker>=20.0",
  "PyYAML>=6.0",
  "matplotlib>=3.7",
]

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.5.0",
]

[project.scripts]
claimguard-generate = "claimguard.cli:main"

[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/claimguard"]
