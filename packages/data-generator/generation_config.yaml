# ClaimGuard Network — Phase 1 generation config
# Field-for-field, this matches the configurable parameters listed in
# §11 of ClaimGuard_Phase1_Data_Generator_Spec.md. Change values here and
# re-run `python generate.py` — no code changes needed for a re-run with
# different seeds/volumes.

seed: 42

# Faker locale used for names. "zu_ZA" is used because the spec's own
# vocabulary (medical "scheme", provider "practice number") is South
# African terminology, and it's the South African locale Faker ships with
# good name coverage for (there is no "en_ZA" name provider). Swap to e.g.
# "en_US" for a different identifier flavor — nothing else needs to change.
locale: "zu_ZA"
currency_symbol: "R"

schemes:
  - id: "A"
    name: "Nedbank Health"
  - id: "B"
    name: "MedSecure"
  - id: "C"
    name: "HealthFirst"

volumes:
  members_per_scheme: 3000
  providers_per_scheme: 250

time:
  start_date: "2023-01-01"
  num_months: 24

claims:
  avg_claims_per_active_member_per_month: 0.4

# §7 — single-scheme fraud archetypes (counts are PER SCHEME)
fraud:
  up_coding:
    count_per_scheme: 6
    severity_sd_multiplier_min: 2.5
    severity_sd_multiplier_max: 4.0

  membership_substitution:
    count_per_scheme: 12
    geographic_count: 8      # implausible-travel variant
    demographic_count: 4     # age/gender-inconsistent-code variant
    min_distance_km: 200

  collusion_ring:
    rings_per_scheme: 2
    members_per_ring: 6
    visit_interval_days_min: 7
    visit_interval_days_max: 14
    amount_relative_noise: 0.03   # how "tight" the clustered amounts are

  ghost_claiming:
    count_per_scheme: 3
    spike_days_min: 15
    spike_days_max: 25
    # Spike-day volume is a MULTIPLE of that provider's own specialty's normal
    # daily capacity baseline (reference_data.py), not a flat number — so a
    # pharmacy spike and a psychologist spike are both equally implausible
    # relative to their own peers, rather than one being unremarkable.
    spike_multiplier_min: 4.0
    spike_multiplier_max: 8.0

# §8 — cross-scheme evasion mechanic
cross_scheme_evasion:
  count: 5
  source_scheme: "A"
  target_schemes: ["B", "C"]
  exit_month: 15                       # last active month for the original identity
  reappearance_offset_months: [1, 2]   # sampled per case
  fingerprint_similarity_concentration: 200   # higher = more similar (Dirichlet concentration)
  severity_jitter_pct: 0.05            # +/- jitter applied to carried-over severity
  location_carryover_probability: 0.6  # chance the practice_location is kept (vs moved)

output:
  data_dir: "data"
